name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Run tests
        run: swift test
